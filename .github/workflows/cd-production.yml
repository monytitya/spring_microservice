# =============================================================================
# CD Production Pipeline — Deploy to Production
# Triggers: push of a version tag  v*.*.*  (e.g. v1.2.0)
#
# Required GitHub Secrets (same as staging + prod equivalents):
#   GHCR_TOKEN           → GitHub Personal Access Token (write:packages)
#   PROD_HOST            → Production server SSH host
#   PROD_USER            → Production server SSH username
#   PROD_SSH_KEY         → Production server SSH private key
#   PROD_DEPLOY_PATH     → Remote path where docker-compose.yml lives
# =============================================================================

name: CD — Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Job 1: Extract version info ─────────────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.tag }}
      changelog: ${{ steps.changelog.outputs.content }}

    steps:
      - name: ⬇️ Checkout source (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 📋 Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" | head -20)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ── Job 2: Build & Push Images ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - discovery-server
          - api-gateway
          - customer-service
          - account-service
          - transaction-service
          - loan-service
          - card-service

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 🔨 Build ${{ matrix.service }} JAR
        run: mvn clean package -pl ${{ matrix.service }} -am -DskipTests -B

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: 🚀 Build & Push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Job 3: Deploy to Production ───────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    environment: production   # ← requires manual approval in GitHub

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: 🚢 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            export VERSION=${{ needs.prepare.outputs.version }}
            export IMAGE_TAG=${VERSION}

            echo "🔑 Logging into GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "📥 Pulling production images (version: ${VERSION})..."
            IMAGE_TAG=${IMAGE_TAG} docker compose pull

            echo "♻️ Rolling restart..."
            IMAGE_TAG=${IMAGE_TAG} docker compose up -d --remove-orphans

            echo "🧹 Pruning old images..."
            docker image prune -f

            echo "✅ Production deployment complete! Version: ${VERSION}"

  # ── Job 4: Create GitHub Release ──────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, deploy-production]

    steps:
      - name: 📦 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: "🚀 Release ${{ needs.prepare.outputs.version }}"
          body: |
            ## 🏦 Banking Microservices — ${{ needs.prepare.outputs.version }}

            ### Docker Images
            All images published to GitHub Container Registry:
            ```
            ghcr.io/${{ github.repository_owner }}/config-server:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/discovery-server:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/api-gateway:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/customer-service:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/account-service:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/transaction-service:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/loan-service:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/card-service:${{ needs.prepare.outputs.version }}
            ```

            ### Changes
            ${{ needs.prepare.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
