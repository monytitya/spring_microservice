# =============================================================================
# Security Scanning Pipeline
# Triggers: push to main + weekly schedule (Sundays at 2AM UTC)
#
# Reports go to:
#   - GitHub Security → Code Scanning Alerts (SARIF upload)
#   - Workflow artifacts (HTML reports)
# =============================================================================

name: Security — Vulnerability Scanning

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Job 1: OWASP Dependency Check ─────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 🔨 Build project (skip tests)
        run: mvn clean package -DskipTests -B

      - name: 🛡️ Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "spring-banking-microservices"
          path: "."
          format: "ALL"
          out: "reports/dependency-check"
          args: >
            --enableRetired
            --enableExperimental
            --suppression suppression.xml
        continue-on-error: true

      - name: 📤 Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-report
          path: reports/dependency-check/
          retention-days: 30

      - name: 📤 Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/dependency-check/dependency-check-report.sarif
        continue-on-error: true

  # ── Job 2: Trivy Container Image Scanning ─────────────────────────────────
  trivy-image-scan:
    name: Trivy Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - discovery-server
          - api-gateway
          - customer-service
          - account-service
          - transaction-service
          - loan-service
          - card-service

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 🔨 Build ${{ matrix.service }} JAR
        run: mvn clean package -pl ${{ matrix.service }} -am -DskipTests -B

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: false
          tags: banking/${{ matrix.service }}:scan
          load: true

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: banking/${{ matrix.service }}:scan
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # Don't fail the build; report only

      - name: 📊 Run Trivy — Table output (human readable)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: banking/${{ matrix.service }}:scan
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

      - name: 📤 Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: "trivy-${{ matrix.service }}"
        continue-on-error: true

      - name: 📤 Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.sarif
          retention-days: 30

  # ── Job 3: Filesystem Scan (source code secrets) ──────────────────────────
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: 🔍 Trivy filesystem scan (secrets + misconfigs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "CRITICAL,HIGH"
          scanners: "secret,misconfig"
          exit-code: "0"

      - name: 📤 Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: "trivy-filesystem"
        continue-on-error: true

  # ── Job 4: Security Summary ────────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-check, trivy-image-scan, trivy-fs-scan]
    if: always()

    steps:
      - name: 📝 Summary
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP Dependency Check | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Image Scans      | ${{ needs.trivy-image-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Filesystem Scan  | ${{ needs.trivy-fs-scan.result }}    |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Results are available in **Security → Code Scanning Alerts**" >> $GITHUB_STEP_SUMMARY
