# =============================================================================
# CI Pipeline — Continuous Integration
# Triggers: every push + every Pull Request targeting main or develop
# =============================================================================

name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx1024m -Dorg.slf4j.simpleLogger.defaultLogLevel=WARN"

jobs:
  # ── Job 1: Compile & Unit Test ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 🔨 Build all modules (skip tests)
        run: mvn clean package -DskipTests -B

      - name: 🧪 Run unit tests
        run: mvn test -B

      - name: 📊 Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/*.xml"
          retention-days: 7

      - name: 📦 Upload built JARs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: "**/target/*-0.0.1-SNAPSHOT.jar"
          retention-days: 1

  # ── Job 2: Code Quality — Static Analysis ─────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 🔍 SpotBugs static analysis
        run: mvn spotbugs:check -B --fail-at-end
        continue-on-error: true

      - name: 📋 Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: "**/target/spotbugsXml.xml"
          retention-days: 7

  # ── Job 3: Docker Image Build Validation ──────────────────────────────────
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - discovery-server
          - api-gateway
          - customer-service
          - account-service
          - transaction-service
          - loan-service
          - card-service

    steps:
      - name: ⬇️ Checkout source
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: false
          tags: banking/${{ matrix.service }}:ci-check
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Job 4: Summary ─────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality, docker-build-check]
    if: always()

    steps:
      - name: ✅ CI passed
        if: ${{ needs.build-and-test.result == 'success' && needs.docker-build-check.result == 'success' }}
        run: echo "All CI checks passed! Ready to merge."

      - name: ❌ CI failed
        if: ${{ needs.build-and-test.result == 'failure' || needs.docker-build-check.result == 'failure' }}
        run: |
          echo "CI failed. Check the job logs above."
          exit 1
