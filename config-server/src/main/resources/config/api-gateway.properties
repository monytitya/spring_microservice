server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Custom Routing Definitions
spring.cloud.gateway.routes[0].id=customer-service
spring.cloud.gateway.routes[0].uri=lb://customer-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/customers/**

spring.cloud.gateway.routes[1].id=account-service
spring.cloud.gateway.routes[1].uri=lb://account-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/accounts/**

spring.cloud.gateway.routes[2].id=transaction-service
spring.cloud.gateway.routes[2].uri=lb://transaction-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/transactions/**

spring.cloud.gateway.routes[3].id=loan-service
spring.cloud.gateway.routes[3].uri=lb://loan-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/loans/**

spring.cloud.gateway.routes[4].id=card-service
spring.cloud.gateway.routes[4].uri=lb://card-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/cards/**

spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notifications/**

# Swagger/OpenAPI proxy configuration
spring.cloud.gateway.routes[6].id=swagger-api-accounts
spring.cloud.gateway.routes[6].uri=lb://account-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/accounts/swagger-ui.html,/api/accounts/api-docs/**

spring.cloud.gateway.routes[7].id=swagger-api-customers
spring.cloud.gateway.routes[7].uri=lb://customer-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/customers/swagger-ui.html,/api/customers/api-docs/**

spring.cloud.gateway.routes[8].id=swagger-api-transactions
spring.cloud.gateway.routes[8].uri=lb://transaction-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/transactions/swagger-ui.html,/api/transactions/api-docs/**

spring.cloud.gateway.routes[9].id=swagger-api-loans
spring.cloud.gateway.routes[9].uri=lb://loan-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/loans/swagger-ui.html,/api/loans/api-docs/**

spring.cloud.gateway.routes[10].id=swagger-api-cards
spring.cloud.gateway.routes[10].uri=lb://card-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/cards/swagger-ui.html,/api/cards/api-docs/**
