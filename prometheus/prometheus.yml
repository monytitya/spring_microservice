# =============================================================================
# Prometheus Scrape Configuration
# Scrapes Spring Boot Actuator /actuator/prometheus endpoints
# =============================================================================

global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout:      10s

  external_labels:
    cluster: "banking-local"
    environment: "docker"

# ── Alerting (optional — connect to Alertmanager if you add it) ──────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Rule files ───────────────────────────────────────────────────────────────
# rule_files:
#   - "alert-rules.yml"

# ── Scrape Configurations ────────────────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Spring Boot Services ────────────────────────────────────────────────────
  - job_name: "config-server"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 30s
    static_configs:
      - targets: ["config-server:8888"]
        labels:
          service: "config-server"
          component: "platform"

  - job_name: "discovery-server"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 30s
    static_configs:
      - targets: ["discovery-server:8761"]
        labels:
          service: "discovery-server"
          component: "platform"

  - job_name: "api-gateway"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 15s
    static_configs:
      - targets: ["api-gateway:8080"]
        labels:
          service: "api-gateway"
          component: "platform"

  - job_name: "customer-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 15s
    static_configs:
      - targets: ["customer-service:8081"]
        labels:
          service: "customer-service"
          component: "business"

  - job_name: "account-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 15s
    static_configs:
      - targets: ["account-service:8082"]
        labels:
          service: "account-service"
          component: "business"

  - job_name: "transaction-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 15s
    static_configs:
      - targets: ["transaction-service:8083"]
        labels:
          service: "transaction-service"
          component: "business"

  - job_name: "loan-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 15s
    static_configs:
      - targets: ["loan-service:8084"]
        labels:
          service: "loan-service"
          component: "business"

  - job_name: "card-service"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 15s
    static_configs:
      - targets: ["card-service:8085"]
        labels:
          service: "card-service"
          component: "business"

  # ── PostgreSQL (via postgres_exporter — optional) ───────────────────────────
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # ── Kafka (via JMX exporter — optional) ────────────────────────────────────
  # - job_name: "kafka"
  #   static_configs:
  #     - targets: ["kafka-jmx-exporter:7071"]
