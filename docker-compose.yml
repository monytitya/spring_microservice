services:
  # =====================================================================
  # INFRASTRUCTURE
  # =====================================================================

  postgres:
    image: postgres:15-alpine
    container_name: banking-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - banking-network
    labels:
      - "com.banking.service=infrastructure"
      - "com.banking.component=database"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: banking-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - banking-network
    labels:
      - "com.banking.service=infrastructure"
      - "com.banking.component=zookeeper"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: banking-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server=localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - banking-network
    labels:
      - "com.banking.service=infrastructure"
      - "com.banking.component=kafka"

  # =====================================================================
  # CONFIGURATION & DISCOVERY
  # =====================================================================

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-server
    image: banking/config-server:${IMAGE_TAG:-latest}
    container_name: banking-config-server
    restart: unless-stopped
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: native,docker
      SERVER_PORT: 8888
      JAVA_OPTS: "-Xms64m -Xmx128m"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - banking-network
    labels:
      - "com.banking.service=platform"
      - "com.banking.component=config-server"

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: discovery-server
    image: banking/discovery-server:${IMAGE_TAG:-latest}
    container_name: banking-discovery-server
    restart: unless-stopped
    ports:
      - "${DISCOVERY_SERVER_PORT:-8761}:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8761
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - banking-network
    labels:
      - "com.banking.service=platform"
      - "com.banking.component=discovery-server"

  # =====================================================================
  # MICROSERVICES
  # =====================================================================

  customer-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: customer-service
    image: banking/customer-service:${IMAGE_TAG:-latest}
    container_name: banking-customer-service
    restart: unless-stopped
    ports:
      - "${CUSTOMER_SERVICE_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8081
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/customer_db"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
    networks:
      - banking-network
    labels:
      - "com.banking.service=business"
      - "com.banking.component=customer-service"

  account-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: account-service
    image: banking/account-service:${IMAGE_TAG:-latest}
    container_name: banking-account-service
    restart: unless-stopped
    ports:
      - "${ACCOUNT_SERVICE_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8082
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/account_db"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
    networks:
      - banking-network
    labels:
      - "com.banking.service=business"
      - "com.banking.component=account-service"

  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: transaction-service
    image: banking/transaction-service:${IMAGE_TAG:-latest}
    container_name: banking-transaction-service
    restart: unless-stopped
    ports:
      - "${TRANSACTION_SERVICE_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8083
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/transaction_db"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
    networks:
      - banking-network
    labels:
      - "com.banking.service=business"
      - "com.banking.component=transaction-service"

  loan-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: loan-service
    image: banking/loan-service:${IMAGE_TAG:-latest}
    container_name: banking-loan-service
    restart: unless-stopped
    ports:
      - "${LOAN_SERVICE_PORT:-8084}:8084"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8084
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/loan_db"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
    networks:
      - banking-network
    labels:
      - "com.banking.service=business"
      - "com.banking.component=loan-service"

  card-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: card-service
    image: banking/card-service:${IMAGE_TAG:-latest}
    container_name: banking-card-service
    restart: unless-stopped
    ports:
      - "${CARD_SERVICE_PORT:-8085}:8085"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8085
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/card_db"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
    networks:
      - banking-network
    labels:
      - "com.banking.service=business"
      - "com.banking.component=card-service"

  # =====================================================================
  # API GATEWAY
  # =====================================================================

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    image: banking/api-gateway:${IMAGE_TAG:-latest}
    container_name: banking-api-gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
      customer-service:
        condition: service_started
      account-service:
        condition: service_started
      transaction-service:
        condition: service_started
      loan-service:
        condition: service_started
      card-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8080
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
    networks:
      - banking-network
    labels:
      - "com.banking.service=platform"
      - "com.banking.component=api-gateway"

volumes:
  postgres-data:
    name: banking-postgres-data

networks:
  banking-network:
    name: banking-network
    driver: bridge
